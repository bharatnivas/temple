<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple - South Indian Temple Campus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewport">
    <div id="world">
      <!-- Stone roads -->
      <div class="road road-main-vertical"></div>
      <div class="road road-horizontal-top"></div>
      <div class="road road-horizontal-bottom"></div>
      <div class="road road-left-branch"></div>
      <div class="road road-right-branch"></div>
      <div class="road road-pond-path"></div>

      <!-- Gopuram Entrance -->
      <div class="structure gopuram" id="gopuram">
        <div class="gopuram-base"></div>
        <div class="gopuram-tier gopuram-tier-1"></div>
        <div class="gopuram-tier gopuram-tier-2"></div>
        <div class="gopuram-tier gopuram-tier-3"></div>
        <div class="gopuram-tier gopuram-tier-4"></div>
        <div class="gopuram-top"></div>
        <div class="gopuram-gate"></div>
        <div class="structure-label">Gopuram Entrance</div>
      </div>

      <!-- Ganesha Shrine -->
      <div class="structure shrine ganesha-shrine" id="ganesha-shrine">
        <div class="shrine-roof shrine-roof-ganesha"></div>
        <div class="shrine-body">
          <div class="deity ganesha hidden" id="ganesha-deity">
            <div class="ganesha-head"></div>
            <div class="ganesha-trunk"></div>
            <div class="ganesha-body-shape"></div>
            <div class="ganesha-ear ganesha-ear-left"></div>
            <div class="ganesha-ear ganesha-ear-right"></div>
          </div>
        </div>
        <div class="shrine-pillars">
          <div class="pillar"></div>
          <div class="pillar"></div>
        </div>
        <div class="structure-label">Ganesha Shrine</div>
      </div>

      <!-- Nandi Statue -->
      <div class="structure nandi-statue" id="nandi">
        <div class="nandi-body"></div>
        <div class="nandi-head"></div>
        <div class="nandi-horn nandi-horn-left"></div>
        <div class="nandi-horn nandi-horn-right"></div>
        <div class="nandi-hump"></div>
        <div class="nandi-legs">
          <div class="nandi-leg"></div>
          <div class="nandi-leg"></div>
          <div class="nandi-leg"></div>
          <div class="nandi-leg"></div>
        </div>
        <div class="nandi-platform"></div>
        <div class="structure-label">Nandi</div>
      </div>

      <!-- Main Shiva Temple -->
      <div class="structure main-temple" id="shiva-temple">
        <div class="temple-vimana">
          <div class="vimana-tier vimana-tier-1"></div>
          <div class="vimana-tier vimana-tier-2"></div>
          <div class="vimana-tier vimana-tier-3"></div>
          <div class="vimana-kalash"></div>
        </div>
        <div class="temple-body">
          <div class="garbhagriha">
            <div class="deity shiva-lingam hidden" id="shiva-deity">
              <div class="lingam-base"></div>
              <div class="lingam-stone"></div>
              <div class="lingam-glow"></div>
            </div>
          </div>
        </div>
        <div class="temple-mandapa">
          <div class="pillar"></div>
          <div class="pillar"></div>
          <div class="pillar"></div>
          <div class="pillar"></div>
        </div>
        <div class="temple-steps"></div>
        <div class="structure-label">Shiva Temple</div>
      </div>

      <!-- Parvati Shrine -->
      <div class="structure shrine parvati-shrine" id="parvati-shrine">
        <div class="shrine-roof shrine-roof-parvati"></div>
        <div class="shrine-body">
          <div class="deity parvati hidden" id="parvati-deity">
            <div class="parvati-head"></div>
            <div class="parvati-crown"></div>
            <div class="parvati-body-shape"></div>
            <div class="parvati-hands"></div>
          </div>
        </div>
        <div class="shrine-pillars">
          <div class="pillar"></div>
          <div class="pillar"></div>
        </div>
        <div class="structure-label">Parvati (Ambal) Shrine</div>
      </div>

      <!-- Murugan Shrine -->
      <div class="structure shrine murugan-shrine" id="murugan-shrine">
        <div class="shrine-roof shrine-roof-murugan"></div>
        <div class="shrine-body">
          <div class="deity murugan hidden" id="murugan-deity">
            <div class="murugan-head"></div>
            <div class="murugan-body-shape"></div>
            <div class="murugan-vel"></div>
            <div class="peacock">
              <div class="peacock-body"></div>
              <div class="peacock-head"></div>
              <div class="peacock-tail">
                <div class="peacock-feather"></div>
                <div class="peacock-feather"></div>
                <div class="peacock-feather"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="shrine-pillars">
          <div class="pillar"></div>
          <div class="pillar"></div>
        </div>
        <div class="structure-label">Murugan Shrine</div>
      </div>

      <!-- Temple Pond -->
      <div class="temple-pond" id="pond">
        <div class="pond-water"></div>
        <div class="pond-steps pond-steps-left"></div>
        <div class="pond-steps pond-steps-right"></div>
        <div class="pond-steps pond-steps-top"></div>
        <div class="pond-steps pond-steps-bottom"></div>
        <div class="pond-label">Temple Tank</div>
      </div>

      <!-- Temple Lamps -->
      <div class="temple-lamp" style="left: 720px; top: 1580px;">
        <div class="lamp-pillar"></div>
        <div class="lamp-cup"></div>
        <div class="lamp-flame"><div class="flame-inner"></div></div>
      </div>
      <div class="temple-lamp" style="left: 880px; top: 1580px;">
        <div class="lamp-pillar"></div>
        <div class="lamp-cup"></div>
        <div class="lamp-flame"><div class="flame-inner"></div></div>
      </div>
      <div class="temple-lamp" style="left: 720px; top: 1180px;">
        <div class="lamp-pillar"></div>
        <div class="lamp-cup"></div>
        <div class="lamp-flame"><div class="flame-inner"></div></div>
      </div>
      <div class="temple-lamp" style="left: 880px; top: 1180px;">
        <div class="lamp-pillar"></div>
        <div class="lamp-cup"></div>
        <div class="lamp-flame"><div class="flame-inner"></div></div>
      </div>
      <div class="temple-lamp" style="left: 720px; top: 880px;">
        <div class="lamp-pillar"></div>
        <div class="lamp-cup"></div>
        <div class="lamp-flame"><div class="flame-inner"></div></div>
      </div>
      <div class="temple-lamp" style="left: 880px; top: 880px;">
        <div class="lamp-pillar"></div>
        <div class="lamp-cup"></div>
        <div class="lamp-flame"><div class="flame-inner"></div></div>
      </div>

      <!-- Trees -->
      <div class="tree" style="left: 200px; top: 400px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 350px; top: 300px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 1200px; top: 400px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 1350px; top: 300px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 150px; top: 800px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 1400px; top: 800px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 200px; top: 1200px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 1350px; top: 1200px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 150px; top: 1600px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 1400px; top: 1600px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 300px; top: 1800px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 1250px; top: 1800px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 100px; top: 500px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 1500px; top: 500px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 100px; top: 1000px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>
      <div class="tree" style="left: 1500px; top: 1000px;"><div class="tree-trunk"></div><div class="tree-canopy"></div></div>

      <!-- Compound Wall -->
      <div class="compound-wall wall-top"></div>
      <div class="compound-wall wall-bottom"></div>
      <div class="compound-wall wall-left"></div>
      <div class="compound-wall wall-right"></div>

      <!-- Player -->
      <div id="player">
        <div class="player-body"></div>
        <div class="player-head"></div>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div id="location-name">Temple Entrance</div>
      <div id="instructions">Use arrow keys to explore the temple</div>
    </div>

    <!-- Deity popup -->
    <div id="deity-popup" class="hidden">
      <div id="deity-popup-content"></div>
      <div id="deity-popup-name"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
